<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pappu Game Play | Pro Edition</title>
    <style>
        :root {
            --bg-main: #f0faff;
            --white: #ffffff;
            --accent-cyan: #00bcd4;
            --pool-gold: #d97706;
            --text-main: #1e293b;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            background: linear-gradient(180deg, #e0f7fa 0%, #ffffff 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .title-badge {
            background: linear-gradient(90deg, #0284c7, #00bcd4);
            color: white;
            padding: 8px 35px;
            border-radius: 0 0 25px 25px;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 188, 212, 0.3);
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .dashboard {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin: 10px 0;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #ffffff;
            text-align: center;
            align-items: center;
        }

        .stat-label { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }
        .stat-val { font-size: 1.5rem; font-weight: 800; color: var(--accent-cyan); display: block; }
        #timer { font-size: 3.5rem; font-weight: 900; color: #0369a1; line-height: 1; margin: 5px 0; }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 500px;
            padding: 20px;
            background: rgba(186, 230, 253, 0.2);
            border-radius: 30px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--white);
            border-radius: 20px;
            padding: 20px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            position: relative;
        }

        .card.win-glow {
            border: 3px solid var(--success);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.4);
            animation: winner-bounce 0.6s infinite alternate;
        }

        @keyframes winner-bounce { from { transform: scale(1); } to { transform: scale(1.05); } }

        .emoji { font-size: 3rem; display: block; margin-bottom: 10px; }
        .bet-tag { background: #f1f5f9; color: var(--pool-gold); font-size: 0.9rem; font-weight: 800; padding: 5px 15px; border-radius: 12px; border: 1px solid #e2e8f0; }

        #result-popup { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 300px; padding: 35px 20px; border-radius: 30px; text-align: center;
            z-index: 9999; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3); color: white; display: none;
            border: 4px solid #ffffff;
        }
        #result-popup.show { transform: translate(-50%, -50%) scale(1); display: block; }
        .win-bg { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .loss-bg { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        .pop-emoji { font-size: 6rem; display: block; margin-bottom: 15px; }
        .pop-text { font-size: 2.2rem; font-weight: 900; }

        .history { display: flex; gap: 12px; margin: 15px 0; justify-content: center; min-height: 80px; }
        .h-item-wrapper { display: flex; flex-direction: column; align-items: center; }
        .h-circle { 
            width: 48px; height: 48px; background: white; 
            border-radius: 50%; display: grid; place-items: center; 
            border: 2px solid var(--accent-cyan); font-size: 1.6rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .h-amount { font-size: 0.65rem; font-weight: 800; color: #0369a1; margin-top: 4px; background: #fff; padding: 2px 5px; border-radius: 5px; border: 1px solid #bae6fd; }

        .bet-bar { 
            background: #ffffff; padding: 15px 35px; border-radius: 50px; 
            display: flex; gap: 15px; align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06); margin: 20px 0; 
            border: 1px solid #e2e8f0;
        }
        input { border: 2px solid #e2e8f0; border-radius: 25px; padding: 12px; width: 120px; text-align: center; font-weight: 800; font-size: 1.1rem; color: #0369a1; outline: none; }

        @media (max-width: 400px) { .stat-val { font-size: 1.2rem; } #timer { font-size: 3rem; } }
    </style>
</head>
<body>

    <div class="title-badge">Pappu Game Play</div>

    <div id="result-popup">
        <span class="pop-emoji" id="pop-icon">🎁</span>
        <div class="pop-text" id="pop-title">...</div>
        <div style="font-size: 1.4rem; margin-top: 10px; font-weight: 800;" id="pop-amount"></div>
    </div>

    <div class="dashboard">
        <div><span class="stat-label">WALLET</span><span class="stat-val">₹<span id="bal">...</span></span></div>
        <div><div id="timer">--</div><span id="status" style="font-size:0.7rem; font-weight:900;">SYNCING</span></div>
        <div><span class="stat-label">POOL</span><span class="stat-val" id="pool" style="color:var(--pool-gold)">0</span></div>
    </div>

    <div class="history" id="hist"></div>
    <div class="grid" id="grid"></div>

    <div class="bet-bar">
        <input type="number" id="amt" value="100" min="10">
        <span style="font-weight: 700; color: #64748b;">Tap to Bet</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, runTransaction, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBL6_PZO69nI5Ci5sb0k-seiDUVz2K3hjU",
            authDomain: "luckyplaygame-6b4c2.firebaseapp.com",
            databaseURL: "https://luckyplaygame-6b4c2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "luckyplaygame-6b4c2",
            storageBucket: "luckyplaygame-6b4c2.firebasestorage.app",
            messagingSenderId: "628388666824",
            appId: "1:628388666824:web:82e2a59c1daf2eac49f4fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const signs = ['☂️','⚽','☀️','🪔','🐄','🪣','🪁','🛸','🌷','🦋','🐦','🐓'];
        const userId = "king666";

        let myWallet = 0;
        let canBet = false;
        let globalBets = {};
        let myCurrentBets = {}; 

        const gridUI = document.getElementById('grid');
        signs.forEach((s, i) => {
            gridUI.innerHTML += `<div class="card" id="card-${i}" onclick="placeBet(${i})">
                <span class="emoji">${s}</span><div class="bet-tag" id="tag-${i}">₹0</div></div>`;
        });

        onValue(ref(db, `users/${userId}`), (snap) => {
            const data = snap.val();
            myWallet = data ? (data.balance || 50000) : 50000;
            myCurrentBets = data ? (data.currentRoundBets || {}) : {};
            document.getElementById('bal').innerText = myWallet;
        });

        window.placeBet = (id) => {
            if (!canBet) return;
            const amount = parseInt(document.getElementById('amt').value);
            if (amount > myWallet) return alert("Insufficient Balance!");
            update(ref(db, `users/${userId}`), { balance: myWallet - amount });
            runTransaction(ref(db, `users/${userId}/currentRoundBets/${id}`), (curr) => (curr || 0) + amount);
            runTransaction(ref(db, `luckyGame/bets/${id}`), (curr) => (curr || 0) + amount);
        };

        const popup = document.getElementById('result-popup');
        const popIcon = document.getElementById('pop-icon');
        const popTitle = document.getElementById('pop-title');
        const popAmt = document.getElementById('pop-amount');

        onValue(ref(db, 'luckyGame'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            const t = data.timer;
            document.getElementById('timer').innerText = t;

            if (t > 10) {
                canBet = true;
                popup.classList.remove('show', 'win-bg', 'loss-bg');
                document.querySelectorAll('.card').forEach(c => c.classList.remove('win-glow'));
                document.getElementById('status').innerText = "OPEN";
                document.getElementById('status').style.color = "var(--success)";
            } else {
                canBet = false;
                document.getElementById('status').innerText = t <= 0 ? "RESULT" : "CLOSED";
                document.getElementById('status').style.color = "var(--danger)";
            }

            let pool = 0;
            globalBets = data.bets || {};
            signs.forEach((_, i) => document.getElementById(`tag-${i}`).innerText = "₹0");
            for (let id in globalBets) {
                if(document.getElementById(`tag-${id}`)) {
                    document.getElementById(`tag-${id}`).innerText = `₹${globalBets[id]}`;
                    pool += globalBets[id];
                }
            }
            document.getElementById('pool').innerText = pool;

            if (t === 0 && data.lastWin !== undefined) {
                const winIdx = data.lastWin;
                if(winIdx !== -1) document.getElementById(`card-${winIdx}`)?.classList.add('win-glow');
                popIcon.innerText = winIdx === -1 ? "🏠" : signs[winIdx];
                const amountOnWinner = (winIdx !== -1) ? (myCurrentBets[winIdx] || 0) : 0;

                if (amountOnWinner > 0) {
                    const winTotal = amountOnWinner * 9;
                    popTitle.innerText = "YOU WON!";
                    popAmt.innerText = `Received: ₹${winTotal}`;
                    popup.classList.add('show', 'win-bg');
                    setTimeout(() => {
                        update(ref(db, `users/${userId}`), { balance: myWallet + winTotal, currentRoundBets: null });
                    }, 1000);
                } else {
                    popTitle.innerText = "TRY AGAIN!";
                    popAmt.innerText = winIdx === -1 ? "HOUSE WINS!" : `Result: ${signs[winIdx]}`;
                    popup.classList.add('show', 'loss-bg');
                    setTimeout(() => { update(ref(db, `users/${userId}`), { currentRoundBets: null }); }, 1000);
                }
                setTimeout(() => { popup.classList.remove('show'); }, 4500);
            }

            if (data.history) {
                // SYNC FIX: Handling both old (string) and new (object) history data
                document.getElementById('hist').innerHTML = data.history.map(h => {
                    const icon = typeof h === 'object' ? h.icon : h;
                    const amount = typeof h === 'object' ? (h.amount || 0) : 0;
                    return `
                        <div class="h-item-wrapper">
                            <div class="h-circle">${icon}</div>
                            <div class="h-amount">₹${amount}</div>
                        </div>
                    `;
                }).join('');
            }
        });

        setInterval(() => {
            runTransaction(ref(db, 'luckyGame/timer'), (curr) => {
                if (curr === null) return 60;
                let next = curr - 1;
                if (next < -6) {
                    update(ref(db, 'luckyGame'), { bets: null });
                    return 60; 
                }
                if (next === 0) calculateWinnerLocally();
                return next;
            });
        }, 1000);

        function calculateWinnerLocally() {
            let total = 0;
            for (let id in globalBets) total += globalBets[id];
            let safe = [];
            signs.forEach((_, i) => { 
                let betOnSign = globalBets[i] || 0;
                if (betOnSign === 0 || (betOnSign * 9) <= total) safe.push(i);
            });
            const winIdx = safe.length > 0 ? safe[Math.floor(Math.random() * safe.length)] : -1;
            const historyIcon = winIdx === -1 ? "🏠" : signs[winIdx];
            const winningAmount = winIdx === -1 ? 0 : (globalBets[winIdx] || 0);

            get(ref(db, 'luckyGame/history')).then(s => {
                let h = s.val() || [];
                h.unshift({ icon: historyIcon, amount: winningAmount });
                if (h.length > 5) h.pop();
                update(ref(db, 'luckyGame'), { lastWin: winIdx, history: h });
            });
        }
    </script>
</body>
</html>
