<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King666 | Professional Realtime Game</title>
    <style>
        :root { --bg: #e0f7fa; --accent: #00bcd4; --gold: #d97706; --white: #ffffff; }
        body { background: radial-gradient(circle, #f0f9ff 0%, #bae6fd 100%); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; }
        
        /* Dashboard */
        .dashboard { width: 95%; max-width: 900px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; margin: 20px 0; display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #fff; }
        .stat-label { font-size: 0.7rem; font-weight: bold; color: #64748b; text-transform: uppercase; }
        .stat-val { display: block; font-size: 1.5rem; font-weight: 800; color: var(--accent); }
        #timer { font-size: 3.5rem; font-weight: 900; color: #0369a1; line-height: 1; }
        .critical { color: #ef4444 !important; animation: blink 0.8s infinite; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; width: 95%; max-width: 900px; padding: 15px; background: rgba(255, 255, 255, 0.3); border-radius: 20px; }
        .card { background: var(--white); border-radius: 12px; padding: 15px 5px; text-align: center; cursor: pointer; transition: 0.2s; border-bottom: 4px solid #cbd5e1; position: relative; }
        .card.win { border: 4px solid #22c55e; background: #f0fdf4; transform: scale(1.05); box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); z-index: 5; }
        .card.disabled { opacity: 0.6; cursor: not-allowed; }
        .emoji { font-size: 2.5rem; display: block; }
        .bet-tag { background: #f1f5f9; color: var(--gold); font-size: 0.8rem; font-weight: bold; padding: 3px; border-radius: 5px; margin-top: 5px; }

        /* Controls */
        .history { display: flex; gap: 8px; margin: 15px 0; }
        .h-circle { width: 40px; height: 40px; background: #fff; border-radius: 50%; display: grid; place-items: center; border: 2px solid var(--accent); font-size: 1.2rem; }
        .bet-bar { background: #fff; padding: 12px 30px; border-radius: 50px; display: flex; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin: 20px 0; }
        input { border: 2px solid var(--accent); border-radius: 20px; padding: 8px; width: 100px; text-align: center; font-weight: bold; outline: none; }

        @keyframes blink { 50% { opacity: 0.5; } }
        @media (max-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

    <div class="dashboard">
        <div><span class="stat-label">My Balance</span><span class="stat-val">₹<span id="bal">...</span></span></div>
        <div><div id="timer">--</div><span id="status" style="font-size: 0.7rem; font-weight: bold; color: #16a34a;">SYNCING</span></div>
        <div><span class="stat-label">Total Pool</span><span class="stat-val" id="pool" style="color: var(--gold);">₹0</span></div>
    </div>

    <div class="history" id="hist"></div>
    <div class="grid" id="grid"></div>

    <div class="bet-bar">
        <input type="number" id="amt" value="100">
        <span style="line-height: 35px; font-weight: bold; color: #64748b;">Click Icon to Bet</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, runTransaction, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBL6_PZO69nI5Ci5sb0k-seiDUVz2K3hjU",
            authDomain: "luckyplaygame-6b4c2.firebaseapp.com",
            databaseURL: "https://luckyplaygame-6b4c2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "luckyplaygame-6b4c2",
            storageBucket: "luckyplaygame-6b4c2.firebasestorage.app",
            messagingSenderId: "628388666824",
            appId: "1:628388666824:web:82e2a59c1daf2eac49f4fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const symbols = ['☂️','⚽','☀️','🪔','🐄','🪣','🪁','🛸','🌷','🦋','🐦','🐓'];
        const userId = "king666";

        let myWallet = 0;
        let canBet = false;
        let globalBets = {};
        let myRoundBets = {}; 

        // --- UI Setup ---
        const gridUI = document.getElementById('grid');
        symbols.forEach((s, i) => {
            gridUI.innerHTML += `<div class="card" id="card-${i}" onclick="placeBet(${i})">
                <span class="emoji">${s}</span><div class="bet-tag" id="tag-${i}">₹0</div></div>`;
        });

        // 1. User Balance Persistence
        onValue(ref(db, `users/${userId}/balance`), (snap) => {
            if (snap.exists()) {
                myWallet = snap.val();
            } else {
                myWallet = 50000;
                set(ref(db, `users/${userId}/balance`), 50000);
            }
            document.getElementById('bal').innerText = myWallet;
        });

        // 2. Placing Bets (Targeted Mapping)
        window.placeBet = (id) => {
            if (!canBet) return;
            const amount = parseInt(document.getElementById('amt').value);
            if (amount > myWallet) return alert("Balance Low!");

            // Deduct from DB Wallet
            update(ref(db, `users/${userId}`), { balance: myWallet - amount });
            
            // Track my bets to credit winnings later
            myRoundBets[id] = (myRoundBets[id] || 0) + amount;

            // Update Global Pool for this specific ID
            runTransaction(ref(db, `luckyGame/bets/${id}`), (curr) => (curr || 0) + amount);
        };

        // 3. Realtime Sync Listener
        onValue(ref(db, 'luckyGame'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const t = data.timer;
            document.getElementById('timer').innerText = t;
            
            // UI States
            if (t > 10) {
                canBet = true;
                document.getElementById('status').innerText = "BETTING OPEN";
                document.getElementById('status').style.color = "#16a34a";
                document.getElementById('timer').classList.remove('critical');
                document.querySelectorAll('.card').forEach(c => c.classList.remove('disabled', 'win'));
            } else {
                canBet = false;
                document.getElementById('status').innerText = (t <= 0) ? "RESULT" : "CLOSED";
                document.getElementById('status').style.color = "#ef4444";
                if(t > 0) document.getElementById('timer').classList.add('critical');
                document.querySelectorAll('.card').forEach(c => c.classList.add('disabled'));
            }

            // Pool & Bet Mapping Fix
            let pool = 0;
            globalBets = data.bets || {};
            symbols.forEach((_, i) => document.getElementById(`tag-${i}`).innerText = "₹0");
            for (let id in globalBets) {
                if(document.getElementById(`tag-${id}`)) {
                    document.getElementById(`tag-${id}`).innerText = `₹${globalBets[id]}`;
                    pool += globalBets[id];
                }
            }
            document.getElementById('pool').innerText = pool;

            // Reset local memory when round restarts
            if (t === 60) {
                myRoundBets = {};
            }

            // Winner & Auto-Credit Winnings
            if (t === 0 && data.lastWin !== undefined) {
                document.getElementById(`card-${data.lastWin}`)?.classList.add('win');
                
                // If user won, add to balance in DB
                if (myRoundBets[data.lastWin]) {
                    const winAmt = myRoundBets[data.lastWin] * 9;
                    update(ref(db, `users/${userId}`), { balance: myWallet + winAmt });
                    myRoundBets = {}; // Clear to avoid double credit
                }
            }

            if (data.history) {
                document.getElementById('hist').innerHTML = data.history.map(h => `<div class="h-circle">${h}</div>`).join('');
            }
        });

        // 4. Global Engine (Runs on master time)
        function startEngine() {
            setInterval(() => {
                runTransaction(ref(db, 'luckyGame/timer'), (curr) => {
                    if (curr === null) return 60;
                    let next = curr - 1;

                    if (next === 0) calculateWinnerLocally();
                    
                    if (next < -5) {
                        update(ref(db, 'luckyGame'), { bets: null });
                        return 60;
                    }
                    return next;
                });
            }, 1000);
        }

        function calculateWinnerLocally() {
            let total = 0;
            for (let id in globalBets) total += globalBets[id];
            let safe = [];
            symbols.forEach((_, i) => {
                if ((globalBets[i] || 0) * 9 <= total) safe.push(i);
            });
            const winnerIdx = safe.length > 0 ? safe[Math.floor(Math.random() * safe.length)] : Math.floor(Math.random() * 12);
            
            get(ref(db, 'luckyGame/history')).then(s => {
                let h = s.val() || [];
                h.unshift(symbols[winnerIdx]);
                if (h.length > 5) h.pop();
                update(ref(db, 'luckyGame'), { lastWin: winnerIdx, history: h });
            });
        }

        startEngine();
    </script>
</body>
</html>
