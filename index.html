<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pappu Game Play | Zero-Loss Pro</title>
    <style>
        :root {
            --bg-casino: #e0f7fa;
            --white-card: #ffffff;
            --accent-cyan: #00bcd4;
            --bet-amber: #d97706;
            --text-dark: #334155;
            --neon-green: #22c55e;
            --neon-red: #ef4444;
        }

        body {
            background-color: var(--bg-casino);
            background-image: radial-gradient(#bae6fd 0.5px, #e0f7fa 0.5px);
            background-size: 10px 10px;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        .title-badge {
            background: linear-gradient(135deg, #0369a1, #00bcd4);
            color: white;
            padding: 8px 25px;
            border-radius: 0 0 20px 20px;
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(0, 188, 212, 0.4);
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .dashboard {
            width: 95%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 20px;
            margin: 10px 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #fff;
            align-items: center;
        }

        .stat-label { font-size: 0.75rem; font-weight: bold; color: #64748b; text-transform: uppercase; }
        .stat-val { display: block; font-size: 1.6rem; font-weight: 800; color: var(--accent-cyan); }
        #timer { font-size: 3.8rem; font-weight: 900; color: #0369a1; line-height: 1; }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 columns based on your image */
            gap: 15px;
            width: 95%;
            max-width: 600px;
            padding: 20px;
            background: rgba(186, 230, 253, 0.3);
            border-radius: 25px;
        }

        .card {
            background: var(--white-card);
            border-radius: 15px;
            padding: 20px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease-out;
            border: 1px solid #e2e8f0;
            box-shadow: 0 5px 0px #cbd5e1;
            position: relative;
        }

        .card.win-glow {
            border: 4px solid var(--neon-green);
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--neon-green);
            z-index: 10;
        }

        .emoji { font-size: 3rem; display: block; margin-bottom: 5px; }
        .bet-tag { background: #f8fafc; color: var(--bet-amber); font-size: 0.9rem; font-weight: 800; padding: 4px 12px; border-radius: 10px; margin-top: 5px; display: inline-block; border: 1px solid #e2e8f0; }

        #result-popup { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 300px; padding: 40px 20px; border-radius: 25px; text-align: center;
            z-index: 2000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 25px 80px rgba(0,0,0,0.6); color: white; display: none;
            border: 4px solid #fff;
        }
        #result-popup.show { transform: translate(-50%, -50%) scale(1); display: block; }
        .win-bg { background: radial-gradient(circle at top, #22c55e, #15803d); }
        .loss-bg { background: radial-gradient(circle at top, #ef4444, #b91c1c); }
        .pop-emoji { font-size: 6rem; display: block; margin-bottom: 15px; }
        .pop-text { font-size: 2.2rem; font-weight: 900; text-transform: uppercase;}

        .history { display: flex; gap: 10px; margin: 15px 0; justify-content: center; }
        .h-circle { width: 45px; height: 45px; background: #fff; border-radius: 50%; display: grid; place-items: center; border: 2px solid var(--accent-cyan); font-size: 1.5rem; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        .bet-bar { background: #fff; padding: 15px 35px; border-radius: 50px; display: flex; gap: 15px; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin: 25px 0; border: 1px solid #e2e8f0; }
        input[type="number"] { border: 2px solid var(--accent-cyan); border-radius: 20px; padding: 10px; width: 110px; text-align: center; font-weight: bold; outline: none; font-size: 1.1rem; }

        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="title-badge">Pappu Game Play</div>

    <div id="result-popup">
        <span class="pop-emoji" id="pop-icon">🎁</span>
        <div class="pop-text" id="pop-title">...</div>
        <div style="font-size: 1.4rem; margin-top: 15px; font-weight: bold;" id="pop-amount"></div>
    </div>

    <div class="dashboard">
        <div><span class="stat-label">Wallet</span><span class="stat-val">₹<span id="bal">...</span></span></div>
        <div><div id="timer">--</div><span id="status" style="font-size:0.75rem; font-weight:bold; color: #16a34a">SYNCING</span></div>
        <div><span class="stat-label">Pool</span><span class="stat-val" id="pool" style="color:var(--bet-amber)">3800</span></div>
    </div>

    <div class="history" id="hist"></div>
    <div class="grid" id="grid"></div>

    <div class="bet-bar">
        <input type="number" id="amt" value="100" min="10">
        <span style="font-weight: bold; color: #64748b;">Tap Icon to Bet</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, runTransaction, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBL6_PZO69nI5Ci5sb0k-seiDUVz2K3hjU",
            authDomain: "luckyplaygame-6b4c2.firebaseapp.com",
            databaseURL: "https://luckyplaygame-6b4c2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "luckyplaygame-6b4c2",
            storageBucket: "luckyplaygame-6b4c2.firebasestorage.app",
            messagingSenderId: "628388666824",
            appId: "1:628388666824:web:82e2a59c1daf2eac49f4fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const signs = ['☂️','⚽','☀️','🪔','🐄','🪣','🪁','🛸','🌷','🦋','🐦','🐓'];
        const userId = "king666";

        let myWallet = 0;
        let canBet = false;
        let globalBets = {};
        let myCurrentBets = {}; 

        const gridUI = document.getElementById('grid');
        signs.forEach((s, i) => {
            gridUI.innerHTML += `<div class="card" id="card-${i}" onclick="placeBet(${i})">
                <span class="emoji">${s}</span><div class="bet-tag" id="tag-${i}">₹0</div></div>`;
        });

        // Sync Wallet & Player Record
        onValue(ref(db, `users/${userId}`), (snap) => {
            const data = snap.val();
            myWallet = data ? (data.balance || 50000) : 50000;
            myCurrentBets = data ? (data.currentRoundBets || {}) : {};
            document.getElementById('bal').innerText = myWallet;
        });

        window.placeBet = (id) => {
            if (!canBet) return;
            const amount = parseInt(document.getElementById('amt').value);
            if (amount > myWallet) return alert("Insufficient Balance!");
            update(ref(db, `users/${userId}`), { balance: myWallet - amount });
            runTransaction(ref(db, `users/${userId}/currentRoundBets/${id}`), (curr) => (curr || 0) + amount);
            runTransaction(ref(db, `luckyGame/bets/${id}`), (curr) => (curr || 0) + amount);
        };

        const popup = document.getElementById('result-popup');
        const popIcon = document.getElementById('pop-icon');
        const popTitle = document.getElementById('pop-title');
        const popAmt = document.getElementById('pop-amount');

        onValue(ref(db, 'luckyGame'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            const t = data.timer;
            document.getElementById('timer').innerText = t;

            if (t > 10) {
                canBet = true;
                popup.classList.remove('show', 'win-bg', 'loss-bg');
                document.querySelectorAll('.card').forEach(c => c.classList.remove('win-glow'));
                document.getElementById('status').innerText = "OPEN";
                document.getElementById('status').style.color = "#16a34a";
            } else {
                canBet = false;
                document.getElementById('status').innerText = t <= 0 ? "RESULT" : "CLOSED";
                document.getElementById('status').style.color = "#ef4444";
            }

            // Pool Display
            let pool = 0;
            globalBets = data.bets || {};
            signs.forEach((_, i) => document.getElementById(`tag-${i}`).innerText = "₹0");
            for (let id in globalBets) {
                if(document.getElementById(`tag-${id}`)) {
                    document.getElementById(`tag-${id}`).innerText = `₹${globalBets[id]}`;
                    pool += globalBets[id];
                }
            }
            document.getElementById('pool').innerText = pool;

            // Result Popup
            if (t === 0 && data.lastWin !== undefined) {
                const winIdx = data.lastWin;
                if(winIdx !== -1) document.getElementById(`card-${winIdx}`)?.classList.add('win-glow');
                popIcon.innerText = winIdx === -1 ? "🏠" : signs[winIdx];
                const amountOnWinner = (winIdx !== -1) ? (myCurrentBets[winIdx] || 0) : 0;

                if (amountOnWinner > 0) {
                    const winTotal = amountOnWinner * 9;
                    popTitle.innerText = "YOU WON!";
                    popAmt.innerText = `Win: ₹${winTotal}`;
                    popup.classList.add('show', 'win-bg');
                    setTimeout(() => {
                        update(ref(db, `users/${userId}`), { balance: myWallet + winTotal, currentRoundBets: null });
                    }, 1000);
                } else {
                    popTitle.innerText = "TRY AGAIN!";
                    popAmt.innerText = winIdx === -1 ? "House Wins!" : `Result: ${signs[winIdx]}`;
                    popup.classList.add('show', 'loss-bg');
                    setTimeout(() => { update(ref(db, `users/${userId}`), { currentRoundBets: null }); }, 1000);
                }
                setTimeout(() => { popup.classList.remove('show'); }, 4000);
            }

            if (data.history) {
                document.getElementById('hist').innerHTML = data.history.map(h => `<div class="h-circle">${h}</div>`).join('');
            }
        });

        // MASTER TIMER ENGINE with Recovery Logic
        setInterval(() => {
            runTransaction(ref(db, 'luckyGame/timer'), (curr) => {
                // Recovery: Agar timer null hai ya kisi ne pehle shuru nahi kiya
                if (curr === null) return 60;
                
                let next = curr - 1;

                // Recovery: Agar timer 0 par atak jaye toh result nikaal kar reset karo
                if (next < -5) {
                    update(ref(db, 'luckyGame'), { bets: null });
                    return 60; 
                }

                if (next === 0) {
                    calculateWinnerLocally();
                }

                return next;
            });
        }, 1000);

        function calculateWinnerLocally() {
            let total = 0;
            for (let id in globalBets) total += globalBets[id];
            
            // ZERO-LOSS LOGIC: Only pick signs that don't make Admin lose money
            let safe = [];
            signs.forEach((_, i) => { 
                let betOnSign = globalBets[i] || 0;
                if (betOnSign === 0 || (betOnSign * 9) <= total) {
                    safe.push(i);
                }
            });

            const winIdx = safe.length > 0 ? safe[Math.floor(Math.random() * safe.length)] : -1;
            const historyIcon = winIdx === -1 ? "🏠" : signs[winIdx];

            get(ref(db, 'luckyGame/history')).then(s => {
                let h = s.val() || [];
                h.unshift(historyIcon);
                if (h.length > 5) h.pop();
                update(ref(db, 'luckyGame'), { lastWin: winIdx, history: h });
            });
        }
    </script>
</body>
</html>
