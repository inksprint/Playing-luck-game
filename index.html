<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King666 | Firebase Realtime Game</title>
    <style>
        :root {
            --bg-main: #e0f7fa;
            --card-white: #ffffff;
            --accent-blue: #00bcd4;
            --danger-red: #ff5252;
            --success-green: #4caf50;
            --gold-text: #b45309;
        }

        body {
            background: radial-gradient(circle, #f0f9ff 0%, #bae6fd 100%);
            color: #1e293b;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard {
            width: 95%; max-width: 1000px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            text-align: center;
            border: 1px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .stat-label { font-size: 0.7rem; font-weight: bold; color: #64748b; text-transform: uppercase; }
        .stat-value { font-size: 1.4rem; font-weight: 800; color: var(--accent-blue); display: block; }
        
        #timer { font-size: 3rem; font-weight: 900; color: #0369a1; }
        .timer-warning { color: var(--danger-red) !important; animation: pulse 1s infinite; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            width: 95%; max-width: 1000px;
            padding: 15px;
            background: rgba(186, 230, 253, 0.4);
            border-radius: 20px;
        }

        .sign-card {
            background: var(--card-white);
            border-radius: 12px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 0px #cbd5e1;
        }

        .sign-card.winner { border: 4px solid var(--success-green); background: #f0fdf4; transform: scale(1.05); }
        .emoji { font-size: 2.5rem; display: block; }
        .bet-badge { background: #f1f5f9; color: var(--gold-text); font-size: 0.8rem; font-weight: bold; padding: 4px; border-radius: 5px; margin-top: 8px; }

        .history-box { display: flex; gap: 8px; margin: 15px 0; }
        .h-item { width: 40px; height: 40px; background: #fff; border-radius: 50%; display: grid; place-items: center; border: 2px solid var(--accent-blue); }

        .controls { background: #fff; padding: 10px 25px; border-radius: 50px; display: flex; gap: 15px; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px;}
        input { border: 2px solid var(--accent-blue); border-radius: 20px; padding: 8px; width: 100px; text-align: center; font-weight: bold; }

        @keyframes pulse { 50% { transform: scale(1.1); } }
        @media (max-width: 768px) { .game-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

    <div class="dashboard">
        <div>
            <span class="stat-label">User: king666</span>
            <span class="stat-value">₹<span id="wallet-val">50000</span></span>
        </div>
        <div>
            <span class="stat-label">Total Pool</span>
            <span class="stat-value" id="total-pool" style="color: #d97706;">₹0</span>
            <span id="status-tag" style="font-size: 0.7rem; font-weight: bold; color: var(--success-green);">OPEN</span>
        </div>
        <div>
            <div id="timer">60</div>
            <span class="stat-label">Seconds</span>
        </div>
    </div>

    <div class="history-box" id="history-box"></div>

    <div class="game-grid" id="main-grid"></div>

    <div class="controls">
        <input type="number" id="bet-input" value="100">
        <span style="font-size: 0.8rem; color: #64748b;">Tap icon to bet</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBL6_PZO69nI5Ci5sb0k-seiDUVz2K3hjU",
            authDomain: "luckyplaygame-6b4c2.firebaseapp.com",
            databaseURL: "https://luckyplaygame-6b4c2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "luckyplaygame-6b4c2",
            storageBucket: "luckyplaygame-6b4c2.firebasestorage.app",
            messagingSenderId: "628388666824",
            appId: "1:628388666824:web:82e2a59c1daf2eac49f4fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const symbols = ['☂️','⚽','☀️','🪔','🐄','🪣','🪁','🛸','🌷','🦋','🐦','🐓'];
        let wallet = 50000;
        let timeLeft = 60;
        let canBet = true;
        let localBets = Array(12).fill(0);

        // UI Refs
        const grid = document.getElementById('main-grid');
        const timerEl = document.getElementById('timer');

        // Initialize UI
        symbols.forEach((s, i) => {
            grid.innerHTML += `
                <div class="sign-card" id="card-${i}" onclick="placeBet(${i})">
                    <span class="emoji">${s}</span>
                    <div class="bet-badge" id="bet-amt-${i}">Bet: ₹0</div>
                </div>
            `;
        });

        window.placeBet = (index) => {
            if (!canBet) return;
            const amt = parseInt(document.getElementById('bet-input').value);
            if (amt > wallet) return alert("Low Balance!");

            wallet -= amt;
            localBets[index] += amt;
            
            // Sync to Firebase
            update(ref(db, 'currentGame/bets'), { [index]: localBets[index] });
            update(ref(db, 'users/king666'), { balance: wallet });
            updateUI();
        };

        function updateUI() {
            document.getElementById('wallet-val').innerText = wallet;
            let total = 0;
            localBets.forEach((amt, i) => {
                document.getElementById(`bet-amt-${i}`).innerText = `Bet: ₹${amt}`;
                total += amt;
            });
            document.getElementById('total-pool').innerText = `₹${total}`;
        }

        // Firebase Realtime Listeners
        onValue(ref(db, 'currentGame/bets'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                localBets = Object.values(data);
                updateUI();
            }
        });

        // Game Loop Logic (Local Timer - Syncs results)
        function startTimer() {
            const clock = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;

                if (timeLeft === 10) {
                    canBet = false;
                    timerEl.classList.add('timer-warning');
                    document.getElementById('status-tag').innerText = "CLOSED";
                    document.getElementById('status-tag').style.color = "var(--danger-red)";
                }

                if (timeLeft <= 0) {
                    clearInterval(clock);
                    calculateResult();
                }
            }, 1000);
        }

        function calculateResult() {
            const totalCollection = localBets.reduce((a, b) => a + b, 0);
            let safeWinners = [];

            localBets.forEach((amt, i) => {
                if ((amt * 9) <= totalCollection) {
                    safeWinners.push(i);
                }
            });

            const winIdx = safeWinners.length > 0 ? safeWinners[Math.floor(Math.random() * safeWinners.length)] : -1;
            
            if (winIdx !== -1) {
                const winAmt = localBets[winIdx] * 9;
                wallet += winAmt;
                document.getElementById(`card-${winIdx}`).classList.add('winner');
                updateHistory(symbols[winIdx]);
            } else {
                updateHistory('🏠');
            }
            
            updateUI();
            setTimeout(resetGame, 5000);
        }

        function updateHistory(icon) {
            const hb = document.getElementById('history-box');
            hb.innerHTML = `<div class="h-item">${icon}</div>` + hb.innerHTML;
            if (hb.children.length > 5) hb.removeChild(hb.lastChild);
        }

        function resetGame() {
            localBets = Array(12).fill(0);
            set(ref(db, 'currentGame/bets'), localBets);
            timeLeft = 60;
            canBet = true;
            timerEl.classList.remove('timer-warning');
            document.getElementById('status-tag').innerText = "OPEN";
            document.getElementById('status-tag').style.color = "var(--success-green)";
            document.querySelectorAll('.sign-card').forEach(c => c.classList.remove('winner'));
            updateUI();
            startTimer();
        }

        startTimer();
    </script>
</body>
</html>
