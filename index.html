<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pappu Game Play | Shine Edition</title>
    <style>
        :root {
            --bg-main: #0f172a; 
            --bg-gradient: #1e293b; 
            --white: #ffffff;
            --accent-cyan: #0ea5e9; 
            --pool-gold: #fbbf24;
            --text-main: #f8fafc;
            --success: #10b981;
            --danger: #ef4444;
            --neon-wave: #00f3ff;
        }

        body {
            background: radial-gradient(circle at top, var(--bg-gradient) 0%, var(--bg-main) 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- SHINE EFFECT TITLE BADGE --- */
        .title-badge {
            position: relative;
            background: linear-gradient(90deg, #0369a1, #0ea5e9);
            color: white;
            padding: 10px 45px;
            border-radius: 0 0 25px 25px;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1.2px;
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.4);
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            text-transform: uppercase;
            overflow: hidden; /* Shine ko andar rakhne ke liye */
        }

        .title-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right, 
                transparent 0%, 
                rgba(255, 255, 255, 0.4) 50%, 
                transparent 100%
            );
            transform: skewX(-25deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -150%; }
            100% { left: 150%; }
        }

        .dashboard {
            width: 92%;
            max-width: 500px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 22px;
            margin: 5px 0;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            align-items: center;
        }

        .stat-label { font-size: 0.7rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        .stat-val { font-size: 1.4rem; font-weight: 800; color: var(--accent-cyan); display: block; }
        #timer { font-size: 4rem; font-weight: 900; color: #f8fafc; line-height: 0.9; margin: 8px 0; font-variant-numeric: tabular-nums; }
        .timer-warning { color: var(--danger) !important; }

        .chip-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            width: 92%;
            max-width: 500px;
            justify-content: center;
        }
        .chip {
            background: #334155;
            color: white;
            padding: 8px 12px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: 0.2s;
        }
        .chip.active { background: var(--accent-cyan); border-color: white; box-shadow: 0 0 10px var(--accent-cyan); }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 92%;
            max-width: 500px;
            padding: 20px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card {
            background: #1e293b;
            border-radius: 22px;
            padding: 22px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            position: relative;
        }

        .neon-pulse {
            border: 2px solid var(--neon-wave);
            box-shadow: 0 0 15px var(--neon-wave);
            animation: breathe 1.5s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 10px var(--neon-wave); }
            50% { transform: scale(1.02); box-shadow: 0 0 25px var(--neon-wave); }
        }

        .card:active { transform: scale(0.94); }
        .card.win-glow { border: 4px solid var(--success); box-shadow: 0 0 35px rgba(16, 185, 129, 0.6); transform: scale(1.05); background: #064e3b; }

        .emoji { font-size: 3.4rem; display: block; margin-bottom: 10px; }
        .bet-tag { background: rgba(15, 23, 42, 0.6); color: var(--pool-gold); font-size: 1rem; font-weight: 800; padding: 6px 18px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); }

        #result-popup { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 240px; padding: 30px 15px; border-radius: 30px; text-align: center;
            z-index: 9999; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 45px 90px rgba(0,0,0,0.6); color: white; display: none;
            border: 4px solid rgba(255,255,255,0.2);
        }
        #result-popup.show { transform: translate(-50%, -50%) scale(1); display: block; }
        .win-bg { background: linear-gradient(135deg, #059669, #064e3b); }
        .loss-bg { background: linear-gradient(135deg, #dc2626, #7f1d1d); }

        .history { display: flex; gap: 12px; margin: 15px 0; justify-content: center; min-height: 90px; }
        .h-item-wrapper { display: flex; flex-direction: column; align-items: center; }
        .h-circle { width: 54px; height: 54px; background: #1e293b; border-radius: 50%; display: grid; place-items: center; border: 2px solid var(--accent-cyan); font-size: 2rem; box-shadow: 0 6px 15px rgba(0,0,0,0.3); }
        .h-amount { font-size: 0.7rem; font-weight: 900; color: var(--pool-gold); margin-top: 6px; background: #0f172a; padding: 3px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }

        .bet-bar { background: #1e293b; padding: 18px 45px; border-radius: 60px; display: flex; gap: 18px; align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4); margin: 25px 0; border: 1px solid rgba(255,255,255,0.1); }
        input { background: #0f172a; border: 2px solid #334155; border-radius: 35px; padding: 14px; width: 140px; text-align: center; font-weight: 800; font-size: 1.3rem; color: var(--accent-cyan); outline: none; }
    </style>
</head>
<body>

    <div class="title-badge">Pappu Game Play</div>

    <div id="result-popup">
        <span class="pop-emoji" id="pop-icon" style="font-size: 5rem; display: block; margin-bottom: 15px;">🎁</span>
        <div class="pop-text" id="pop-title" style="font-size: 2rem; font-weight: 900;">...</div>
        <div style="font-size: 1.4rem; margin-top: 10px; font-weight: 800; color: var(--pool-gold);" id="pop-amount"></div>
    </div>

    <div class="dashboard">
        <div><span class="stat-label">Wallet</span><span class="stat-val">₹<span id="bal">...</span></span></div>
        <div><div id="timer">--</div><span id="status" style="font-size:0.75rem; font-weight:900;">SYNCING</span></div>
        <div><span class="stat-label">Pool</span><span class="stat-val" id="pool" style="color:var(--pool-gold)">0</span></div>
    </div>

    <div class="history" id="hist"></div>

    <div class="chip-bar">
        <div class="chip" onclick="setAmt(10)">₹10</div>
        <div class="chip" onclick="setAmt(50)">₹50</div>
        <div class="chip active" id="chip-100" onclick="setAmt(100)">₹100</div>
        <div class="chip" onclick="setAmt(500)">₹500</div>
        <div class="chip" onclick="setAmt(1000)">₹1000</div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="bet-bar">
        <input type="number" id="amt" value="100" min="10">
        <span style="font-weight: 800; color: #94a3b8;">Tap to Bet</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, runTransaction, get, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBL6_PZO69nI5Ci5sb0k-seiDUVz2K3hjU",
            authDomain: "luckyplaygame-6b4c2.firebaseapp.com",
            databaseURL: "https://luckyplaygame-6b4c2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "luckyplaygame-6b4c2",
            storageBucket: "luckyplaygame-6b4c2.firebasestorage.app",
            messagingSenderId: "628388666824",
            appId: "1:628388666824:web:82e2a59c1daf2eac49f4fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const signs = ['☂️','⚽','☀️','🪔','🐄','🪣','🪁','🛸','🌷','🦋','🐦','🐓'];
        const userId = "king666";

        const betSound = new Audio('https://www.soundjay.com/buttons/button-37.mp3');
        const tickSound = new Audio('https://www.soundjay.com/buttons/button-50.mp3');
        const winSound = new Audio('https://www.soundjay.com/human/applause-01.mp3');

        let myWallet = 0, canBet = false, globalBets = {}, myCurrentBets = {}, isMaster = false;

        const gridUI = document.getElementById('grid');
        signs.forEach((s, i) => {
            gridUI.innerHTML += `<div class="card" id="card-${i}" onclick="placeBet(${i})">
                <span class="emoji">${s}</span><div class="bet-tag" id="tag-${i}">₹0</div></div>`;
        });

        window.setAmt = (v) => {
            document.getElementById('amt').value = v;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        const masterRef = ref(db, 'luckyGame/master');
        onValue(masterRef, (snap) => { if (!snap.val() || snap.val() === userId) setMaster(); });
        async function setMaster() { await update(ref(db, 'luckyGame'), { master: userId }); onDisconnect(masterRef).remove(); isMaster = true; }

        onValue(ref(db, `users/${userId}`), (snap) => {
            const data = snap.val();
            myWallet = data ? (data.balance || 50000) : 50000;
            myCurrentBets = data ? (data.currentRoundBets || {}) : {};
            document.getElementById('bal').innerText = myWallet;
        });

        window.placeBet = (id) => {
            if (!canBet) return;
            const amount = parseInt(document.getElementById('amt').value);
            if (amount > myWallet) return alert("Balance Low!");
            betSound.play().catch(()=>{});
            update(ref(db, `users/${userId}`), { balance: myWallet - amount });
            runTransaction(ref(db, `users/${userId}/currentRoundBets/${id}`), (curr) => (curr || 0) + amount);
            runTransaction(ref(db, `luckyGame/bets/${id}`), (curr) => (curr || 0) + amount);
        };

        onValue(ref(db, 'luckyGame'), (snapshot) => {
            const data = snapshot.val(); if (!data) return;
            const t = data.timer;
            document.getElementById('timer').innerText = t;

            if (t > 0 && t <= 10) tickSound.play().catch(()=>{});

            if (t > 10) {
                canBet = true;
                document.getElementById('result-popup').classList.remove('show');
                document.querySelectorAll('.card').forEach(c => c.classList.remove('win-glow', 'neon-pulse'));
                document.getElementById('status').innerText = "OPEN";
                document.getElementById('status').style.color = "#10b981";
            } else {
                canBet = false;
                document.getElementById('status').innerText = t <= 0 ? "RESULT" : "CLOSED";
                document.getElementById('status').style.color = "#ef4444";
                if (t > 0) {
                    for (let id in globalBets) if (globalBets[id] > 0) document.getElementById(`card-${id}`).classList.add('neon-pulse');
                }
            }

            let pool = 0;
            globalBets = data.bets || {};
            signs.forEach((_, i) => document.getElementById(`tag-${i}`).innerText = "₹0");
            for (let id in globalBets) {
                document.getElementById(`tag-${id}`).innerText = `₹${globalBets[id]}`;
                pool += globalBets[id];
            }
            document.getElementById('pool').innerText = pool;

            if (t === 0 && data.lastWin !== undefined) {
                const winIdx = data.lastWin;
                if(winIdx !== -1) document.getElementById(`card-${winIdx}`)?.classList.add('win-glow');
                const pop = document.getElementById('result-popup');
                document.getElementById('pop-icon').innerText = winIdx === -1 ? "🏠" : signs[winIdx];
                const amtOnWin = (winIdx !== -1) ? (myCurrentBets[winIdx] || 0) : 0;
                if (amtOnWin > 0) {
                    const total = amtOnWin * 9; winSound.play().catch(()=>{});
                    document.getElementById('pop-title').innerText = "YOU WON!";
                    document.getElementById('pop-amount').innerText = `Win: ₹${total}`;
                    pop.className = "show win-bg";
                    setTimeout(() => { update(ref(db, `users/${userId}`), { balance: myWallet + total, currentRoundBets: null }); }, 1000);
                } else {
                    document.getElementById('pop-title').innerText = "TRY AGAIN!";
                    document.getElementById('pop-amount').innerText = winIdx === -1 ? "HOUSE" : signs[winIdx];
                    pop.className = "show loss-bg";
                    setTimeout(() => { update(ref(db, `users/${userId}`), { currentRoundBets: null }); }, 1000);
                }
            }
            if (data.history) {
                document.getElementById('hist').innerHTML = data.history.map(h => `
                    <div class="h-item-wrapper">
                        <div class="h-circle">${h.icon || h}</div>
                        <div class="h-amount">₹${h.amount || 0}</div>
                    </div>`).join('');
            }
        });

        setInterval(() => {
            if (!isMaster) return;
            runTransaction(ref(db, 'luckyGame/timer'), (curr) => {
                if (curr === null) return 60;
                let next = curr - 1;
                if (next < -6) { update(ref(db, 'luckyGame'), { bets: null }); return 60; }
                if (next === 0) calculateWinnerLocally();
                return next;
            });
        }, 1000);

        function calculateWinnerLocally() {
            let total = 0; for (let id in globalBets) total += globalBets[id];
            let safe = []; signs.forEach((_, i) => { if ((globalBets[i] || 0) * 9 <= total) safe.push(i); });
            const winIdx = safe.length > 0 ? safe[Math.floor(Math.random() * safe.length)] : -1;
            const historyIcon = winIdx === -1 ? "🏠" : signs[winIdx];
            const winningAmount = winIdx === -1 ? 0 : (globalBets[winIdx] || 0);
            get(ref(db, 'luckyGame/history')).then(s => {
                let h = s.val() || []; h.unshift({ icon: historyIcon, amount: winningAmount }); if (h.length > 5) h.pop();
                update(ref(db, 'luckyGame'), { lastWin: winIdx, history: h });
            });
        }
    </script>
</body>
</html>
