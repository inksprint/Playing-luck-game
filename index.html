<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King666 | Fix Bet Mapping</title>
    <style>
        :root { --bg: #e0f7fa; --accent: #00bcd4; --gold: #d97706; --white: #ffffff; }
        body { background: #bae6fd; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .header { width: 95%; max-width: 900px; background: white; border-radius: 15px; padding: 15px; margin: 15px 0; display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #timer { font-size: 3rem; font-weight: 900; color: #00838f; }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; width: 95%; max-width: 900px; }
        .card { background: white; border-radius: 10px; padding: 15px 5px; text-align: center; cursor: pointer; border-bottom: 4px solid #cbd5e1; }
        .card.win { border: 4px solid #22c55e; background: #f0fdf4; transform: scale(1.05); }
        .emoji { font-size: 2.5rem; display: block; }
        .bet-tag { background: #f1f5f9; color: var(--gold); font-size: 0.8rem; font-weight: bold; margin-top: 5px; padding: 2px; border-radius: 4px; }
        .history { display: flex; gap: 8px; margin: 10px 0; }
        .h-circle { width: 35px; height: 35px; background: #fff; border-radius: 50%; display: grid; place-items: center; border: 1px solid var(--accent); }
        .controls { margin: 20px; background: #fff; padding: 10px 20px; border-radius: 50px; display: flex; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { border: 2px solid var(--accent); border-radius: 20px; padding: 8px; width: 80px; text-align: center; font-weight: bold; }
        @media (max-width: 700px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

    <div class="header">
        <div><small>Wallet</small><br><b style="color:var(--accent)">₹<span id="bal">50000</span></b></div>
        <div><div id="timer">--</div><small id="status">SYNCING</small></div>
        <div><small>Total Pool</small><br><b style="color:var(--gold)">₹<span id="pool">0</span></b></div>
    </div>

    <div class="history" id="hist"></div>
    <div class="grid" id="grid"></div>

    <div class="controls">
        <input type="number" id="amt" value="100">
        <span style="line-height: 40px; font-weight: bold; color: #666;">Click Sign to Bet</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBL6_PZO69nI5Ci5sb0k-seiDUVz2K3hjU",
            authDomain: "luckyplaygame-6b4c2.firebaseapp.com",
            databaseURL: "https://luckyplaygame-6b4c2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "luckyplaygame-6b4c2",
            storageBucket: "luckyplaygame-6b4c2.firebasestorage.app",
            messagingSenderId: "628388666824",
            appId: "1:628388666824:web:82e2a59c1daf2eac49f4fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const signs = ['☂️','⚽','☀️','🪔','🐄','🪣','🪁','🛸','🌷','🦋','🐦','🐓'];

        let myWallet = 50000;
        let canBet = false;
        let globalBets = {}; // Store as object to prevent index shifting

        // Build UI
        const gridBox = document.getElementById('grid');
        signs.forEach((s, i) => {
            gridBox.innerHTML += `
                <div class="card" id="card-${i}" onclick="placeBet(${i})">
                    <span class="emoji">${s}</span>
                    <div class="bet-tag" id="tag-${i}">₹0</div>
                </div>
            `;
        });

        window.placeBet = (id) => {
            if (!canBet) return;
            const amount = parseInt(document.getElementById('amt').value);
            if (amount > myWallet) return alert("Balance Low!");

            myWallet -= amount;
            document.getElementById('bal').innerText = myWallet;

            // Target specific sign ID in Firebase
            const betRef = ref(db, `luckyGame/bets/${id}`);
            runTransaction(betRef, (current) => (current || 0) + amount);
        };

        // Realtime Listener
        onValue(ref(db, 'luckyGame'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // Sync Timer
            const t = data.timer;
            document.getElementById('timer').innerText = t;
            canBet = (t > 10);
            document.getElementById('status').innerText = canBet ? "BETTING OPEN" : "CLOSED";

            // Sync Bets - Exact Mapping
            let totalPool = 0;
            globalBets = data.bets || {};
            
            // Sabhi tags reset karein pehle
            signs.forEach((_, i) => document.getElementById(`tag-${i}`).innerText = "₹0");
            
            // Jo data aaya hai usey sahi jagah dalein
            for (let id in globalBets) {
                const amount = globalBets[id];
                if (document.getElementById(`tag-${id}`)) {
                    document.getElementById(`tag-${id}`).innerText = `₹${amount}`;
                    totalPool += amount;
                }
            }
            document.getElementById('pool').innerText = totalPool;

            // Winner & UI Reset
            document.querySelectorAll('.card').forEach(c => c.classList.remove('win'));
            if (t <= 0 && data.lastWin !== undefined) {
                document.getElementById(`card-${data.lastWin}`)?.classList.add('win');
            }

            if (data.history) {
                document.getElementById('hist').innerHTML = data.history.map(h => `<div class="h-circle">${h}</div>`).join('');
            }
        });

        // Master Engine
        function startEngine() {
            setInterval(() => {
                const timerRef = ref(db, 'luckyGame/timer');
                runTransaction(timerRef, (current) => {
                    if (current === null) return 60;
                    let next = current - 1;

                    if (next === 0) {
                        calculateWinnerLocally();
                    }

                    if (next < -5) {
                        update(ref(db, 'luckyGame'), { bets: null }); // Clear bets object
                        return 60;
                    }
                    return next;
                });
            }, 1000);
        }

        function calculateWinnerLocally() {
            let total = 0;
            for (let id in globalBets) total += globalBets[id];

            let safe = [];
            signs.forEach((_, i) => {
                let amt = globalBets[i] || 0;
                if (amt * 9 <= total) safe.push(i);
            });

            const winIdx = safe.length > 0 ? safe[Math.floor(Math.random() * safe.length)] : Math.floor(Math.random() * 12);
            
            onValue(ref(db, 'luckyGame/history'), (s) => {
                let h = s.val() || [];
                h.unshift(signs[winIdx]);
                if (h.length > 5) h.pop();
                update(ref(db, 'luckyGame'), { lastWin: winIdx, history: h });
            }, { onlyOnce: true });
        }

        startEngine();
    </script>
</body>
</html>
