<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King666 | Ultimate Winner Fix</title>
    <style>
        :root { --bg: #e0f7fa; --accent: #00bcd4; --gold: #d97706; --white: #ffffff; --danger: #ef4444; --success: #22c55e; }
        body { background: radial-gradient(circle, #f0f9ff 0%, #bae6fd 100%); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; overflow: hidden; }
        
        .dashboard { width: 95%; max-width: 900px; background: rgba(255, 255, 255, 0.9); border-radius: 20px; padding: 20px; margin: 15px 0; display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #fff; }
        .stat-val { display: block; font-size: 1.5rem; font-weight: 800; color: var(--accent); }
        #timer { font-size: 3.5rem; font-weight: 900; color: #0369a1; line-height: 1; }

        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; width: 95%; max-width: 900px; padding: 15px; }
        .card { background: var(--white); border-radius: 12px; padding: 15px 5px; text-align: center; cursor: pointer; transition: 0.2s; border-bottom: 4px solid #cbd5e1; }
        .card.win-glow { border: 4px solid var(--success); transform: scale(1.05); box-shadow: 0 0 20px var(--success); }
        .emoji { font-size: 2.5rem; display: block; }
        .bet-tag { background: #f1f5f9; color: var(--gold); font-size: 0.8rem; font-weight: bold; margin-top: 5px; padding: 3px; border-radius: 5px; }

        /* Popup Logic */
        #result-popup { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 280px; padding: 30px; border-radius: 25px; text-align: center;
            z-index: 2000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5); color: white; display: none;
        }
        #result-popup.show { transform: translate(-50%, -50%) scale(1); display: block; }
        .win-bg { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%) !important; border: 4px solid white; }
        .loss-bg { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%) !important; border: 4px solid white; }
        
        .pop-emoji { font-size: 5.5rem; display: block; }
        .pop-text { font-size: 2.2rem; font-weight: 900; }

        .history { display: flex; gap: 8px; margin: 10px 0; }
        .h-circle { width: 35px; height: 35px; background: #fff; border-radius: 50%; display: grid; place-items: center; border: 1.5px solid var(--accent); }
        .bet-bar { background: #fff; padding: 12px 30px; border-radius: 50px; display: flex; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { border: 2px solid var(--accent); border-radius: 20px; padding: 8px; width: 90px; text-align: center; font-weight: bold; outline: none; }

        @media (max-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

    <div id="result-popup">
        <span class="pop-emoji" id="pop-icon">🎁</span>
        <div class="pop-text" id="pop-title">...</div>
        <div style="font-size: 1.4rem; margin-top: 10px; font-weight: bold;" id="pop-amount"></div>
    </div>

    <div class="dashboard">
        <div><small>Wallet</small><span class="stat-val">₹<span id="bal">...</span></span></div>
        <div><div id="timer">--</div><small id="status">SYNCING</small></div>
        <div><small>Pool</small><span class="stat-val" id="pool" style="color:var(--gold)">₹0</span></div>
    </div>

    <div class="history" id="hist"></div>
    <div class="grid" id="grid"></div>

    <div class="bet-bar">
        <input type="number" id="amt" value="100">
        <span style="line-height: 40px; font-weight: bold; color: #64748b;">Place Bet</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, runTransaction, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBL6_PZO69nI5Ci5sb0k-seiDUVz2K3hjU",
            authDomain: "luckyplaygame-6b4c2.firebaseapp.com",
            databaseURL: "https://luckyplaygame-6b4c2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "luckyplaygame-6b4c2",
            storageBucket: "luckyplaygame-6b4c2.firebasestorage.app",
            messagingSenderId: "628388666824",
            appId: "1:628388666824:web:82e2a59c1daf2eac49f4fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const signs = ['☂️','⚽','☀️','🪔','🐄','🪣','🪁','🛸','🌷','🦋','🐦','🐓'];
        const userId = "king666";

        let myWallet = 0;
        let canBet = false;
        let globalBets = {};
        let myCurrentBets = {}; // Local snapshot of current round bets

        const gridUI = document.getElementById('grid');
        signs.forEach((s, i) => {
            gridUI.innerHTML += `<div class="card" id="card-${i}" onclick="placeBet(${i})">
                <span class="emoji">${s}</span><div class="bet-tag" id="tag-${i}">₹0</div></div>`;
        });

        // 1. Sync Wallet & Bets
        onValue(ref(db, `users/${userId}`), (snap) => {
            const data = snap.val();
            myWallet = data ? (data.balance || 50000) : 50000;
            myCurrentBets = data ? (data.currentRoundBets || {}) : {};
            document.getElementById('bal').innerText = myWallet;
        });

        // 2. Placing Bets
        window.placeBet = (id) => {
            if (!canBet) return;
            const amount = parseInt(document.getElementById('amt').value);
            if (amount > myWallet) return alert("Balance Low!");

            update(ref(db, `users/${userId}`), { balance: myWallet - amount });
            runTransaction(ref(db, `users/${userId}/currentRoundBets/${id}`), (curr) => (curr || 0) + amount);
            runTransaction(ref(db, `luckyGame/bets/${id}`), (curr) => (curr || 0) + amount);
        };

        const popup = document.getElementById('result-popup');
        const popIcon = document.getElementById('pop-icon');
        const popTitle = document.getElementById('pop-title');
        const popAmt = document.getElementById('pop-amount');

        // 3. Main Listener
        onValue(ref(db, 'luckyGame'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            const t = data.timer;
            document.getElementById('timer').innerText = t;

            if (t > 10) {
                canBet = true;
                popup.classList.remove('show', 'win-bg', 'loss-bg');
                document.querySelectorAll('.card').forEach(c => c.classList.remove('win-glow'));
                document.getElementById('status').innerText = "OPEN";
            } else {
                canBet = false;
                document.getElementById('status').innerText = "CLOSED";
            }

            let pool = 0;
            globalBets = data.bets || {};
            signs.forEach((_, i) => document.getElementById(`tag-${i}`).innerText = "₹0");
            for (let id in globalBets) {
                document.getElementById(`tag-${id}`).innerText = `₹${globalBets[id]}`;
                pool += globalBets[id];
            }
            document.getElementById('pool').innerText = pool;

            // 4. THE FIX: Logic on Result
            if (t === 0 && data.lastWin !== undefined) {
                const winIdx = data.lastWin;
                document.getElementById(`card-${winIdx}`)?.classList.add('win-glow');
                popIcon.innerText = signs[winIdx];
                
                // Result checking using our local snapshot that's locked for this second
                const amountOnWinner = myCurrentBets[winIdx] || 0;

                if (amountOnWinner > 0) {
                    const winTotal = amountOnWinner * 9;
                    popTitle.innerText = "YOU WON!";
                    popAmt.innerText = `Win Amount: ₹${winTotal}`;
                    popup.classList.add('show', 'win-bg');
                    
                    // Award money and clear bets AFTER 1 second to ensure no sync clash
                    setTimeout(() => {
                        update(ref(db, `users/${userId}`), { 
                            balance: myWallet + winTotal,
                            currentRoundBets: null 
                        });
                    }, 1000);
                } else {
                    popTitle.innerText = "TRY AGAIN!";
                    popAmt.innerText = `Result: ${signs[winIdx]}`;
                    popup.classList.add('show', 'loss-bg');
                    setTimeout(() => {
                        update(ref(db, `users/${userId}`), { currentRoundBets: null });
                    }, 1000);
                }
                
                setTimeout(() => { popup.classList.remove('show'); }, 4000);
            }

            if (data.history) {
                document.getElementById('hist').innerHTML = data.history.map(h => `<div class="h-circle">${h}</div>`).join('');
            }
        });

        // 5. Global Engine
        setInterval(() => {
            runTransaction(ref(db, 'luckyGame/timer'), (curr) => {
                if (curr === null) return 60;
                let next = curr - 1;
                if (next === 0) calculateWinnerLocally();
                if (next < -5) {
                    update(ref(db, 'luckyGame'), { bets: null });
                    return 60;
                }
                return next;
            });
        }, 1000);

        function calculateWinnerLocally() {
            let total = 0;
            for (let id in globalBets) total += globalBets[id];
            let safe = [];
            signs.forEach((_, i) => {
                if ((globalBets[i] || 0) * 9 <= total) safe.push(i);
            });
            const winIdx = safe.length > 0 ? safe[Math.floor(Math.random() * safe.length)] : Math.floor(Math.random() * 12);
            get(ref(db, 'luckyGame/history')).then(s => {
                let h = s.val() || [];
                h.unshift(signs[winIdx]);
                if (h.length > 5) h.pop();
                update(ref(db, 'luckyGame'), { lastWin: winIdx, history: h });
            });
        }
    </script>
</body>
</html>
